[package]
name = "merak-codegen"
description = "EVM bytecode generation for Merak compiler"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
merak-ir.workspace = true
merak-symbols.workspace = true
merak-ast.workspace = true
merak-errors.workspace = true
indexmap.workspace = true

# EVM-specific dependencies
primitive-types = "0.13.1"  # For U256, H256, H160
tiny-keccak = { version = "2.0", features = ["keccak"] }  # For function selectors

[dev-dependencies]
# For testing generated bytecode
revm = { version = "14", default-features = false, features = ["std"] }
merak-parser.workspace = true
merak-analyzer.workspace = true
merak.workspace = true
tempfile = "3.10"
